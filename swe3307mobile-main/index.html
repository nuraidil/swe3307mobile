<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>FSKTM Venue Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="wf/styles.css" />
</head>
<body>
  <div class="app">
    <!-- ============ TOP CHROME ============ -->
    <div class="chrome">
      <div class="brand">
        <span class="dot">FSK</span>
        <b>FSKTM Venue Booking</b>&nbsp;<span class="brand-sub">// high-fidelity prototype</span>
      </div>

      <div class="spacer"></div>

      <!-- global time format -->
      <span class="mono" style="font-size:10px;color:#8f8f8f;">TIME</span>
      <div class="seg">
        <button data-chrome="time" data-chrome-time="12">12h</button>
        <button data-chrome="time" data-chrome-time="24">24h</button>
      </div>

      <!-- annotation toggle removed -->

      <!-- prev / next removed -->
      <span class="pos" id="pos"></span>
    </div>

    <!-- ============ STAGE ============ -->
    <div class="stage" id="stage"></div>
  </div>

  <!-- ============ FLOW MAP ============ -->
  <div class="flowmap">
    <div class="node" data-node="dashboard" style="cursor:default;pointer-events:none;"><span>P1</span><small>Dashboard</small></div>
    <span class="arw">→</span>
    <div class="node" data-node="recommend" style="cursor:default;pointer-events:none;"><span>P2</span><small>Recommend</small></div>
    <span class="arw">→</span>
    <div class="node" data-node="summary" style="cursor:default;pointer-events:none;"><span>P3</span><small>Summary</small></div>
    <span class="arw">→</span>
    <div class="node" data-node="calendar" style="cursor:default;pointer-events:none;"><span>P4</span><small>Calendar</small></div>
  </div>

  <script src="wf/screens.js"></script>
  <script src="wf/app.js"></script>
</body>
</html>
